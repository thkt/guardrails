[package]
name = "guardrails"
version = "0.12.0"
edition = "2021"
rust-version = "1.92"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
tempfile = "3"
libc = "0.2"
oxc_allocator = "0.120.0"
oxc_parser = "0.120.0"
oxc_ast = "0.120.0"
oxc_span = "0.120.0"
oxc_ast_visit = "0.120.0"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
